kind = "web"
previewPath = "/"
title = "Live Pair Programming with AI Co-Pilot"
version = "1.0.0"
id = "artifacts/pair-programming"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18754

[services.development]
run = "pnpm --filter @workspace/pair-programming run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pair-programming", "run", "build" ]
publicDir = "artifacts/pair-programming/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18754"
BASE_PATH = "/"
